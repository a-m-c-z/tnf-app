<!DOCTYPE html>
<html>
<head>
    <title>Admin Login — TNF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f1a12;
            color: #e8f0e9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a2b1e;
            border: 1px solid #2a3d2e;
            border-radius: 14px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            color: #f5c518;
            margin-bottom: 8px;
        }
        p { color: #7a9a7e; font-size: 0.9rem; margin-bottom: 28px; }
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f1a12;
            border: 1px solid #2a3d2e;
            border-radius: 8px;
            color: #e8f0e9;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color .2s;
        }
        input[type="password"]:focus { border-color: #2d9e45; }
        button {
            width: 100%;
            padding: 13px;
            background: #2d9e45;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #1a7a2e; }
        .error {
            background: rgba(220,53,69,0.15);
            border: 1px solid #dc3545;
            color: #ff8a93;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.875rem;
        }
        .back { display: block; margin-top: 20px; color: #7a9a7e; font-size: 0.85rem; text-decoration: none; }
        .back:hover { color: #e8f0e9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Admin</h1>
        <p>Enter the admin password to continue</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Login</button>
        </form>
        <a href="/" class="back">← Back to Team Picker</a>
    </div>
</body>
</html>
